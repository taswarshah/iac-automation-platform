version: '3.8'

services:
  # Server API - connects to Azure SQL
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_SERVER=iac-dev.database.windows.net
      - DB_NAME=iac
      - DB_USER=iac
      - DB_PASSWORD=Lahoreone@12
      - DB_PORT=1433
      - JWT_SECRET=038aa3b2-7863-4e43-83d3-9a56a3d1fa4a
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - iac-network

  # Client Web App
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - server
    networks:
      - iac-network

networks:
  iac-network:
    driver: bridge